<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Векрон</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="player-hud">
            <div class="hud-avatar">
                <img src="img/pers/hero_m.png" id="avatar-img">
                <div class="hud-level">6</div>
            </div>
            <div class="hud-stats">
                <div class="hud-line exp"><span>Опыт: 81299/202500</span></div>
                <div class="hud-line valour"><span>Доблесть: 99.51%</span></div>
                <div class="hud-line hp"><span>338/663</span></div>
                <div class="hud-line mp"><span>327/327</span></div>
            </div>
            <div class="hud-currencies">
                <span id="gold">0</span> <span id="silver">0</span> <span id="copper">0</span>
                <span id="diamonds">458.25</span>
            </div>
        </div>

        <div class="game-viewport">
            <div class="side-slots left">
                <div class="slot" id="slot-head"></div>
                <div class="slot" id="slot-weapon"></div>
                <div class="slot" id="slot-chest"></div>
            </div>

            <div id="location-screen" class="screen active">
                <div class="location-header">Центральная Площадь Векрона</div>
            </div>

            <div class="side-slots right">
                <div class="slot" id="slot-legs"></div>
                <div class="slot" id="slot-boots"></div>
                <div class="slot" id="slot-ring"></div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn btn-bag" onclick="showTab('inventory')"></div>
            <div class="nav-btn btn-loc" onclick="showTab('location')"></div>
            <div class="nav-btn btn-map" onclick="showTab('map')"></div>
            <div class="nav-btn btn-hunt" onclick="showTab('hunt')"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
