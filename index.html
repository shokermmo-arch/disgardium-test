<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Disgardium RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="player-hud">
            <div class="hud-stats-container">
                <div id="exp-bar" class="bar-line exp"></div>
                <div id="valour-bar" class="bar-line valour"></div>
                <div id="hp-bar" class="bar-line hp"></div>
                <div id="mp-bar" class="bar-line mp"></div>
            </div>
            <div class="currency-display">
                <span id="gold-val">0</span>
                <span id="silver-val">0</span>
                <span id="copper-val">0</span>
                <span id="diamonds-val">0</span>
            </div>
        </div>

        <div class="game-viewport">
            <div class="location-label">Центральная Площадь</div>
            <div class="hero-character"></div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="console.log('Инвентарь')" style="left: 5%;"></div>
            <div class="nav-btn" onclick="console.log('Персонаж')" style="left: 25%;"></div>
            <div class="nav-btn" onclick="console.log('Карта')" style="left: 45%;"></div>
            <div class="nav-btn" onclick="console.log('Охота')" style="left: 65%;"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
