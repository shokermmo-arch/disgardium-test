<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Векрон - Мир Теней</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="player-hud">
            <div class="hud-avatar-click" onclick="showTab('character')"></div>
            <div id="hp-bar" class="stat-bar hp"></div>
            <div id="mp-bar" class="stat-bar mp"></div>
            <div id="exp-bar" class="stat-bar exp"></div>
            <div class="currency-box">
                <span id="gold-val">0</span>
                <span id="silver-val">0</span>
                <span id="copper-val">0</span>
                <span id="diamonds-val">0</span>
            </div>
        </div>

        <div id="main-viewport" class="game-viewport">
            <div id="location-title" class="location-name">Центральная Площадь</div>
            
            <div id="tab-location" class="tab-content active">
                <div class="hero-render"></div>
            </div>

            <div id="tab-inventory" class="tab-content">
                <div class="inventory-grid" id="inventory-list">
                    </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-btn" onclick="showTab('inventory')" style="left: 10px;"></div>
            <div class="nav-btn" onclick="showTab('location')" style="left: 60px;"></div>
            <div class="nav-btn" onclick="showTab('map')" style="left: 110px;"></div>
            <div class="nav-btn" onclick="showTab('hunt')" style="left: 160px;"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
